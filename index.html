<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>معرض منتجات الأكل</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f8f8;
    }

    header {
      background: #ff6b35;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 30px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.3s;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card h2 {
      margin: 15px 0 10px;
      font-size: 22px;
      color: #333;
    }

    .price {
      color: #ff6b35;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .buy-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 20px;
      background: #28a745;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.3s;
    }

    .buy-btn:hover {
      background: #218838;
    }
  </style>
</head>
<body>

  <header>معرض منتجات الأكل</header>

  <section class="products">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=800" alt="بيتزا">
      <h2>بيتزا</h2>
      <div class="price">3.500 د.ك</div>
      <a href="#" class="buy-btn">اطلب الآن</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?w=800" alt="برجر">
      <h2>برجر</h2>
      <div class="price">2.750 د.ك</div>
      <a href="#" class="buy-btn">اطلب الآن</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908176997-4310b9d5b52b?w=800" alt="شاورما">
      <h2>شاورما</h2>
      <div class="price">1.500 د.ك</div>
      <a href="#" class="buy-btn">اطلب الآن</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800" alt="سلطة">
      <h2>سلطة</h2>
      <div class="price">1.250 د.ك</div>
      <a href="#" class="buy-btn">اطلب الآن</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?w=800" alt="كب كيك">
      <h2>كب كيك</h2>
      <div class="price">0.900 د.ك</div>
      <a href="#" class="buy-btn">اطلب الآن</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=800" alt="باستا">
      <h2>باستا</h2>
      <div class="price">2.250 د.ك</div>
      <a href="#" class="buy-btn">اطلب الآن</a>
    </div>
  </section>

</body>
</html>
