<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>زرين أحمر وأزرق</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
    }

    .buttons {
      margin-bottom: 30px;
    }

    button {
      border: none;
      padding: 15px 25px;
      margin: 10px;
      font-size: 18px;
      color: white;
      cursor: pointer;
      border-radius: 10px;
    }

    .red {
      background-color: red;
    }

    .blue {
      background-color: blue;
    }

    #message {
      font-size: 28px;
      font-weight: bold;
      color: #333;
      text-align: center;
      min-height: 40px;
    }
  </style>
</head>
<body>

  <div class="buttons">
    <button class="red" onclick="showMessage('السلام عليكم')">الأحمر</button>
    <button class="blue" onclick="showMessage('وعليكم السلام')">الأزرق</button>
  </div>

  <div id="message"></div>

  <script>
    function showMessage(text) {
      document.getElementById("message").textContent = text;
    }
  </script>

</body>
</html>
